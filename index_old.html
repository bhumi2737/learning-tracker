
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
<a href="index.html">Home</a>
<a href="courses.html">Courses</a>
<a href="tracker.html">Tracker</a>
<a href="profile.html">Profile</a>
<a href="contact.html">Contact</a>
<a href="login.html">Login</a>
</nav>

<header class="hero">
  <div class="hero-text">
    <h1>Welcome to Learning Tracker</h1>
    <p>Keep tabs on your learning journey</p>
  </div>
  <img src="https://via.placeholder.com/400x300?text=Learn" alt="Learning illustration">
</header>

<div class="container">
<section class="dashboard">
<h2>My Tasks</h2>
<div class="form">
<input type="text" id="topic" placeholder="Topic">
<input type="text" id="status" placeholder="Status">
<input type="number" id="hours" placeholder="Hours">
<button onclick="addTask()">Add Task</button>
</div>
<div class="form">
<select id="filterStatus" onchange="fetchTasks()">
<option value="">All statuses</option>
<option value="pending">Pending</option>
<option value="in progress">In Progress</option>
<option value="done">Done</option>
</select>
<button onclick="clearTasks()">Clear All</button>
<button onclick="toggleSort()" id="sortBtn">Sort by Hours</button>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Topic</th>
<th>Status</th>
<th>Hours</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="taskTable"></tbody>
</table>
</section>
</div>

<footer>
<p>&copy; 2026 Learning Tracker</p>
</footer>

<script src="app.js"></script>
</body>
</html>
